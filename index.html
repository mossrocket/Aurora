<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060b16" />

    <!-- Primary SEO -->
    <title>Aurora Space Health — Solar Storm Health Tracker</title>
    <meta name="description" content="Track how solar storms and geomagnetic activity affect your health in real time. Aurora Space Health uses live NOAA Kp-index data to assess risk for migraines, sleep, fatigue, heart health, mental health, joint pain, and neurological conditions." />
    <link rel="canonical" href="https://auroraspace.health/" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://auroraspace.health/" />
    <meta property="og:site_name" content="Aurora Space Health" />
    <meta property="og:title" content="Aurora Space Health — Solar Storm Health Tracker" />
    <meta property="og:description" content="Real-time NOAA solar weather data translated into personalised health insights for migraines, sleep, fatigue, heart health, and more." />
    <meta property="og:image" content="https://auroraspace.health/Auroralogo.png" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@AuroraSpace_App" />
    <meta name="twitter:title" content="Aurora Space Health — Solar Storm Health Tracker" />
    <meta name="twitter:description" content="Real-time NOAA solar weather data translated into personalised health insights for migraines, sleep, fatigue, heart health, and more." />
    <meta name="twitter:image" content="https://auroraspace.health/Auroralogo.png" />

    <!-- Structured Data (AIO / AI crawlers) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Aurora Space Health",
      "url": "https://auroraspace.health/",
      "description": "Aurora Space Health monitors real-time NOAA Kp-index solar storm data and translates it into personalised health risk assessments for conditions including migraines, sleep disruption, fatigue, heart health, mental health, joint pain, and neurological sensitivity.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "creator": { "@type": "Organization", "name": "Aurora Space Health", "url": "https://auroraspace.health/" },
      "keywords": "solar storm health, geomagnetic storm, Kp index, space weather health, aurora health tracker, solar flare migraines, geomagnetic activity sleep"
    }
    </script>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="/Auroralogo.png" />
    <link rel="apple-touch-icon" href="/Auroralogo.png" />
  </head>
  <body style="margin:0;background:#060b16">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
